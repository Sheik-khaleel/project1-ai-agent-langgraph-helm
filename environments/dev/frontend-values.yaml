# Dev environment overrides for frontend
# Everything not listed here inherits from charts/frontend/values.yaml

image:
  repository: "940722676295.dkr.ecr.ap-south-2.amazonaws.com/project1-ai-agent-langgraph-frontend" # will be set to real ECR URI once ECR exists (Phase 1/2)
  tag: "3064367-11"

replicaCount: 1

ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-south-2:940722676295:certificate/baeb4eca-9977-4323-96d9-27bc360d6101"
    alb.ingress.kubernetes.io/ssl-redirect: '443'
  hosts:
  - host: dev.khaleeldevops.site
    paths:
    - path: /
      pathType: Prefix
  tls: []
