apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orchestrator-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Sheik-khaleel/project1-ai-agent-langgraph-helm.git
    targetRevision: main
    path: charts/orchestrator
    helm:
      valueFiles:
        - ../../environments/dev/orchestrator-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true